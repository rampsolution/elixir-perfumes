<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Elixiir | Perfumes de Diseñador y Árabes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #faf9f6; color: #222; }
        header { background-color: #0a0a0a; color: #d4af37; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-size: 1rem; transition: color 0.3s ease; }
        nav a:hover { color: #d4af37; }
        .hero { background-color: #1a1a1a; color: #d4af37; text-align: center; padding: 100px 20px; border-bottom: 3px solid #d4af37; }
        .hero h2 { font-size: 3rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; color: #ccc; }
        #catalogo { padding: 60px 5%; text-align: center; }
        #catalogo h2 { font-size: 2.5rem; margin-bottom: 40px; color: #111; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .producto-placeholder { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        footer { background-color: #0a0a0a; color: #666; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>Elixiir</h1></div>
        <nav><ul><li><a href="#inicio">Inicio</a></li><li><a href="#catalogo">Catálogo</a></li></ul></nav>
    </header>
    <main>
        <section id="inicio" class="hero">
            <h2>Descubre tu esencia</h2>
            <p>La mejor selección de perfumería árabe y de diseñador.</p>
        </section>
        <section id="catalogo">
            <h2>Nuestras Fragancias</h2>
            <div id="grid-productos" class="grid-productos">
                <div class="producto-placeholder">
                    <h3>Club de Nuit Intense</h3>
                    <p>Armaf - Árabe</p>
                    <p style="color: #d4af37; font-weight: bold; margin-top: 10px;">$45.00</p>
                </div>
            </div>
        </section>
    </main>
    <footer><p>&copy; 2026 Web Elixiir. Todos los derechos reservados.</p></footer>
</body>
</html>
