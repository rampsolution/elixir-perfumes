<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR | Alta Perfumería</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top, #1d1d1d, #080808 55%, #000);
            color: white;
            overflow-x: hidden;
        }

        :root {
            --border: #2c2c2c;
        }

        /* Encabezado y Logo Metálico */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 90px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 70px;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,.35);
            border-bottom: 1px solid rgba(255,255,255,.08);
            z-index: 999;
        }

        .logo {
            font-size: 54px; font-weight: 800; letter-spacing: 12px;
            background: linear-gradient(90deg, #555, #ddd, #ffffff, #bbbbbb, #6a6a6a, #ffffff, #9d9d9d);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: metal 8s linear infinite;
        }

        @keyframes metal {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        nav { display: flex; gap: 35px; }
        nav a { text-decoration: none; color: white; font-size: 15px; font-weight: 500; transition: .35s; position: relative; }
        nav a:hover { color: #dadada; }
        nav a::after { content: ""; position: absolute; left: 0; bottom: -6px; height: 2px; width: 0; background: #bdbdbd; transition: .4s; }
        nav a:hover::after { width: 100%; }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            text-align: center; padding: 100px 30px; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ""; position: absolute; width: 800px; height: 800px; border-radius: 50%;
            background: radial-gradient(rgba(255,255,255,.12), transparent 70%);
            filter: blur(80px); animation: float 12s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(-150px,-50px); }
            100% { transform: translate(150px,120px); }
        }

        .hero-content { position: relative; z-index: 2; max-width: 900px; }
        .hero h1 { font-size: 82px; margin-bottom: 25px; font-weight: 800; line-height: 1.1; }
        .hero p { font-size: 20px; line-height: 1.8; color: #d7d7d7; margin-bottom: 40px; }
        
        .button {
            display: inline-block; padding: 18px 42px; border: 1px solid #7c7c7c;
            text-decoration: none; color: white; border-radius: 50px; transition: .35s;
        }
        .button:hover { transform: translateY(-5px); background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,.25); }

        /* Catálogo y Filtros */
        section { padding: 100px 8%; }
        .section-title { font-size: 42px; margin-bottom: 50px; font-weight: 700; text-align: center; }

        .catalog-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 25px; margin-bottom: 20px; }
        .catalog-toolbar input {
            width: 330px; max-width: 100%; padding: 16px 22px; border-radius: 40px;
            background: #141414; border: 1px solid var(--border); color: white; font-size: 15px; outline: none; transition: .35s;
        }
        .catalog-toolbar input:focus { border-color: #9e9e9e; box-shadow: 0 0 18px rgba(255,255,255,.15); }
        
        .filters { display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 14px 26px; background: #151515; color: white; border: 1px solid #333; border-radius: 40px; cursor: pointer; transition: .35s; font-weight: 600; }
        .filter-btn:hover { background: white; color: black; transform: translateY(-3px); }
        .filter-btn.active { background: white; color: black; }

        #resultsCounter { margin-bottom: 35px; color: #bcbcbc; font-size: 15px; font-weight: 500; }

        /* Secciones por Marca */
        .brand-section { margin-bottom: 90px; }
        .brand-title {
            font-size: 34px; margin-bottom: 35px; font-weight: 700; letter-spacing: 3px;
            padding-bottom: 15px; border-bottom: 1px solid #2d2d2d;
            background: linear-gradient(90deg, #ffffff, #d7d7d7, #8c8c8c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

        /* Tarjetas */
        .card {
            background: linear-gradient(180deg, #151515, #101010);
            border: 1px solid #2d2d2d; border-radius: 22px; overflow: hidden;
            transition: .45s; display: flex; flex-direction: column; position: relative;
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #ffffff, #c9c9c9, #777777);
            opacity: 0; transition: .4s;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,.45); border-color: #8b8b8b; }
        .card:hover::before { opacity: 1; }
        
        .card img {
            width: 100%; height: 320px; object-fit: contain; background: white;
            padding: 30px; transition: .5s;
        }
        .card:hover img { transform: scale(1.05); }

        .card-content { padding: 25px; }
        .brand { color: #9f9f9f; font-size: 14px; margin-bottom: 10px; }
        .name { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .gender { display: inline-block; padding: 8px 18px; border-radius: 30px; background: #222; font-size: 13px; }
        
        footer { text-align: center; padding: 40px; border-top: 1px solid #222; color: #777; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ELIXIR</div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#catalogo">Catálogo</a>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <div class="hero-content">
            <h1>Alta Perfumería</h1>
            <p>Descubre una selección exclusiva de fragancias de diseñador y perfumes árabes cuidadosamente elegidos para quienes buscan elegancia, carácter y distinción.</p>
            <a href="#catalogo" class="button">Explorar Colección</a>
        </div>
    </section>

    <section id="catalogo">
        <h2 class="section-title">Nuestra Colección</h2>

        <div class="catalog-toolbar">
            <input type="text" id="searchInput" placeholder="Buscar perfume o marca...">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="Hombre">Hombre</button>
                <button class="filter-btn" data-filter="Mujer">Mujer</button>
                <button class="filter-btn" data-filter="Unisex">Unisex</button>
            </div>
        </div>

        <div id="resultsCounter"></div>
        <div id="perfumeContainer"></div>
    </section>

    <footer>
        <p>&copy; 2026 ELIXIR. Todos los derechos reservados.</p>
    </footer>

    <script>
        const perfumes = [
            // Diseñador
            { name:"Sauvage Eau de Parfum", brand:"Dior", gender:"Hombre", image:"images/sauvage-edp.jpg" },
            { name:"Dior Homme Intense", brand:"Dior", gender:"Hombre", image:"images/dior-homme-intense.jpg" },
            { name:"Miss Dior", brand:"Dior", gender:"Mujer", image:"images/miss-dior.jpg" },
            { name:"Bleu de Chanel", brand:"Chanel", gender:"Hombre", image:"images/bleu-de-chanel.jpg" },
            { name:"Allure Homme Sport", brand:"Chanel", gender:"Hombre", image:"images/allure-homme-sport.jpg" },
            { name:"Coco Mademoiselle", brand:"Chanel", gender:"Mujer", image:"images/coco-mademoiselle.jpg" },
            { name:"Gucci Guilty", brand:"Gucci", gender:"Hombre", image:"images/gucci-guilty.jpg" },
            { name:"Gucci Bloom", brand:"Gucci", gender:"Mujer", image:"images/gucci-bloom.jpg" },
            { name:"Versace Eros", brand:"Versace", gender:"Hombre", image:"images/versace-eros.jpg" },
            { name:"Versace Dylan Blue", brand:"Versace", gender:"Hombre", image:"images/versace-dylan-blue.jpg" },
            { name:"Bright Crystal", brand:"Versace", gender:"Mujer", image:"images/bright-crystal.jpg" },
            { name:"Y Eau de Parfum", brand:"Yves Saint Laurent", gender:"Hombre", image:"images/y-edp.jpg" },
            { name:"Libre", brand:"Yves Saint Laurent", gender:"Mujer", image:"images/libre.jpg" },
            { name:"Black Opium", brand:"Yves Saint Laurent", gender:"Mujer", image:"images/black-opium.jpg" },
            { name:"1 Million", brand:"Paco Rabanne", gender:"Hombre", image:"images/one-million.jpg" },
            { name:"Invictus", brand:"Paco Rabanne", gender:"Hombre", image:"images/invictus.jpg" },
            { name:"Lady Million", brand:"Paco Rabanne", gender:"Mujer", image:"images/lady-million.jpg" },
            { name:"Bad Boy", brand:"Carolina Herrera", gender:"Hombre", image:"images/bad-boy.jpg" },
            { name:"212 VIP Black", brand:"Carolina Herrera", gender:"Hombre", image:"images/212-vip-black.jpg" },
            { name:"Good Girl", brand:"Carolina Herrera", gender:"Mujer", image:"images/good-girl.jpg" },
            { name:"Le Male Le Parfum", brand:"Jean Paul Gaultier", gender:"Hombre", image:"images/le-male-le-parfum.jpg" },
            { name:"Le Beau", brand:"Jean Paul Gaultier", gender:"Hombre", image:"images/le-beau.jpg" },
            { name:"Scandal Pour Homme", brand:"Jean Paul Gaultier", gender:"Hombre", image:"images/scandal-pour-homme.jpg" },
            { name:"La Belle", brand:"Jean Paul Gaultier", gender:"Mujer", image:"images/la-belle.jpg" },
            { name:"Ultra Male", brand:"Jean Paul Gaultier", gender:"Hombre", image:"images/ultra-male.jpg" },
            // Árabes
            { name:"Khamrah", brand:"Lattafa", gender:"Unisex", image:"images/khamrah.jpg" },
            { name:"Khamrah Qahwa", brand:"Lattafa", gender:"Unisex", image:"images/khamrah-qahwa.jpg" },
            { name:"Asad", brand:"Lattafa", gender:"Hombre", image:"images/asad.jpg" },
            { name:"Yara", brand:"Lattafa", gender:"Mujer", image:"images/yara.jpg" },
            { name:"Yara Tous", brand:"Lattafa", gender:"Mujer", image:"images/yara-tous.jpg" },
            { name:"Fakhar Black", brand:"Lattafa", gender:"Hombre", image:"images/fakhar-black.jpg" },
            { name:"Fakhar Rose", brand:"Lattafa", gender:"Mujer", image:"images/fakhar-rose.jpg" },
            { name:"Ana Abiyedh", brand:"Lattafa", gender:"Unisex", image:"images/ana-abiyedh.jpg" },
            { name:"Club de Nuit Intense Man", brand:"Armaf", gender:"Hombre", image:"images/club-de-nuit-intense.jpg" },
            { name:"Club de Nuit Milestone", brand:"Armaf", gender:"Hombre", image:"images/club-de-nuit-milestone.jpg" },
            { name:"Club de Nuit Sillage", brand:"Armaf", gender:"Unisex", image:"images/club-de-nuit-sillage.jpg" },
            { name:"Club de Nuit Untold", brand:"Armaf", gender:"Unisex", image:"images/club-de-nuit-untold.jpg" },
            { name:"9PM", brand:"Afnan", gender:"Hombre", image:"images/9pm.jpg" },
            { name:"Supremacy Not Only Intense", brand:"Afnan", gender:"Hombre", image:"images/supremacy-not-only-intense.jpg" },
            { name:"Turathi Blue", brand:"Afnan", gender:"Hombre", image:"images/turathi-blue.jpg" },
            { name:"Rare Carbon", brand:"Afnan", gender:"Hombre", image:"images/rare-carbon.jpg" },
            { name:"Amber Oud Gold Edition", brand:"Al Haramain", gender:"Unisex", image:"images/amber-oud-gold.jpg" },
            { name:"Amber Oud Ruby Edition", brand:"Al Haramain", gender:"Unisex", image:"images/amber-oud-ruby.jpg" },
            { name:"Detour Noir", brand:"Al Haramain", gender:"Hombre", image:"images/detour-noir.jpg" },
            { name:"Kismet Magic", brand:"Maison Alhambra", gender:"Unisex", image:"images/kismet-magic.jpg" },
            { name:"Jean Lowe Immortal", brand:"Maison Alhambra", gender:"Hombre", image:"images/jean-lowe-immortal.jpg" },
            { name:"Woody Oud", brand:"Maison Alhambra", gender:"Unisex", image:"images/woody-oud.jpg" },
            { name:"Hawas", brand:"Rasasi", gender:"Hombre", image:"images/hawas.jpg" },
            { name:"La Yuqawam", brand:"Rasasi", gender:"Hombre", image:"images/la-yuqawam.jpg" },
            { name:"Shaghaf Oud", brand:"Swiss Arabian", gender:"Unisex", image:"images/shaghaf-oud.jpg" },
            { name:"Casablanca", brand:"Swiss Arabian", gender:"Unisex", image:"images/casablanca.jpg" }
        ];

        const container = document.getElementById("perfumeContainer");
        const search = document.getElementById("searchInput");
        const buttons = document.querySelectorAll(".filter-btn");
        const counter = document.getElementById("resultsCounter");
        
        let currentFilter = "all";

        function render() {
            container.innerHTML = "";
            const text = search.value.toLowerCase();
            
            const result = perfumes.filter(item => {
                const genderMatch = currentFilter === "all" || item.gender === currentFilter;
                const searchMatch = item.name.toLowerCase().includes(text) || item.brand.toLowerCase().includes(text);
                return genderMatch && searchMatch;
            });

            counter.innerHTML = `${result.length} perfumes encontrados`;

            const marcas = {};
            result.forEach(item => {
                if(!marcas[item.brand]) { marcas[item.brand] = []; }
                marcas[item.brand].push(item);
            });

            for(const marca in marcas) {
                let htmlTarjetas = '';
                
                marcas[marca].forEach(item => {
                    htmlTarjetas += `
                    <div class="card">
                        <img src="${item.image}" loading="lazy" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x320?text=Falta+Foto'">
                        <div class="card-content">
                            <div class="brand">🏷️ ${item.brand}</div>
                            <div class="name">${item.name}</div>
                            <div class="gender">${item.gender}</div>
                        </div>
                    </div>`;
                });

                container.innerHTML += `
                <div class="brand-section">
                    <h2 class="brand-title">${marca}</h2>
                    <div class="brand-grid">
                        ${htmlTarjetas}
                    </div>
                </div>`;
            }
        }

        search.addEventListener("keyup", render);

        buttons.forEach(btn => {
            btn.onclick = () => {
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                render();
            };
        });

        // Inicializar
        render();
    </script>
</body>
</html>
